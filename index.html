<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudTech Quiz Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; position: relative; }
        .meta-status { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .q-text { font-size: 1.1rem; font-weight: bold; line-height: 1.5; white-space: pre-wrap; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; text-align: center; box-sizing: border-box; font-weight: bold; }
        .btn-primary { background: #232f3e; color: white; }
        .btn-secondary { background: #e2e8f0; color: #333; }
        .btn-success { background: #2ec4b6; color: white; }
        .btn-danger { background: #e71d36; color: white; }
        .ans-box { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #e2e8f0; }
        .ans-text { font-size: 1.5rem; color: #ff9900; font-weight: bold; margin-bottom: 10px; }
        .commentary { font-size: 0.95rem; line-height: 1.6; background: #f8fafc; padding: 15px; border-radius: 6px; white-space: pre-wrap; margin-bottom: 15px; }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav-btns { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; color: #232f3e; cursor: pointer; user-select: none; font-weight: bold; margin-top: 10px; }
        .checkbox-label input { width: 18px; height: 18px; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-ok { background: #e6fffa; color: #00a389; border: 1px solid #81e6d9; }
        .badge-ng { background: #fff5f5; color: #e53e3e; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="card">
    <div class="meta-status">
        <span id="progress-text">準備中...</span>
        <span id="history-badge"></span>
    </div>

    <div id="question" class="q-text">問題が読み込まれません。</div>
    
    <label class="checkbox-label">
        <input type="checkbox" id="mastered-check" onchange="toggleMastered()">
        この問題はもう覚えた！(次回から除外)
    </label>
    
    <button id="show-btn" class="btn btn-primary" onclick="showAnswer()">答えを見る</button>
    
    <div id="answer-section" class="ans-box">
        <div id="answer" class="ans-text"></div>
        <div id="commentary" class="commentary"></div>
        
        <div class="action-btns">
            <button class="btn btn-danger" onclick="recordResult(false)" style="margin:0; flex:1;">✕ 間違えた</button>
            <button class="btn btn-success" onclick="recordResult(true)" style="margin:0; flex:1;">◯ 正解した</button>
        </div>
        
        <div class="nav-btns">
            <button class="btn btn-secondary" onclick="prevQuestion()" style="margin:0; width: 30%;">前へ</button>
            <button class="btn btn-primary" onclick="nextQuestion()" style="margin:0; flex-grow:1;">次の未習得へ</button>
        </div>
    </div>
</div>

<script>
    // スプレッドシートから持ってくるマスタデータ（※ID属性を一意に付与するのがポイントです）
    const quizData = [
        {
            id: "aws_001",
            q: `AWSにおける「リージョン（Region）」の説明として、最も適切なものはどれですか？\nA: 単一の巨大なデータセンター。\nB: 独立した複数のデータセンター群（拠点）。\nC: 1つの都市の中に設置されたサーバーのラック。`,
            a: "B",
            c: "AWSの「リージョン」とは、世界中に展開されている「地理的なエリア（拠点）」のことです。"
        },
        {
            id: "aws_002",
            q: `AWSの「エッジロケーション」の説明として、最も適切なものはどれですか？\nA: 地下に埋設されたデータセンター。\nB: 主にデータの配信（キャッシュ）に特化した拠点。\nC: テスト用の仮想環境。`,
            a: "B",
            c: "エッジロケーションは、主にデータの配信（キャッシュ）に特化した拠点です。"
        }
    ];

    let currentIndex = 0;
    // localStorageからユーザーデータをロード
    let userProgress = JSON.parse(localStorage.getItem('aws_quiz_progress')) || {};

    function saveUserData() {
        localStorage.setItem('aws_quiz_progress', JSON.stringify(userProgress));
    }

    function renderQuestion() {
        const item = quizData[currentIndex];
        const status = userProgress[item.id] || { mastered: false, lastResult: null };
        
        // 進捗・履歴表示
        document.getElementById('progress-text').innerText = `問題 ${currentIndex + 1} / ${quizData.length}`;
        const badge = document.getElementById('history-badge');
        if (status.lastResult === true) {
            badge.className = "badge badge-ok";
            badge.innerText = "直近: ◯ 正解";
        } else if (status.lastResult === false) {
            badge.className = "badge badge-ng";
            badge.innerText = "直近: ✕ 不正解";
        } else {
            badge.className = "";
            badge.innerText = "未解答";
        }

        // チェックボックスの状態反映
        document.getElementById('mastered-check').checked = status.mastered;

        // 問題テキスト
        document.getElementById('question').innerText = `Q. \n${item.q}`;
        document.getElementById('answer').innerText = `正解: ${item.a}`;
        document.getElementById('commentary').innerText = item.c;
        
        // UI初期化
        document.getElementById('answer-section').style.display = 'none';
        document.getElementById('show-btn').style.display = 'block';
    }

    function showAnswer() {
        document.getElementById('answer-section').style.display = 'block';
        document.getElementById('show-btn').style.display = 'none';
    }

    // 「覚えた」のトグル
    function toggleMastered() {
        const item = quizData[currentIndex];
        if (!userProgress[item.id]) userProgress[item.id] = { mastered: false, lastResult: null };
        
        userProgress[item.id].mastered = document.getElementById('mastered-check').checked;
        saveUserData();
    }

    // 正誤の記録
    function recordResult(isCorrect) {
        const item = quizData[currentIndex];
        if (!userProgress[item.id]) userProgress[item.id] = { mastered: false, lastResult: null };
        
        userProgress[item.id].lastResult = isCorrect;
        saveUserData();
        
        // 判定後、自動で次の「まだ覚えていない問題」へ進む
        nextQuestion();
    }

    // 次の未習得問題を探して移動
    function nextQuestion() {
        let found = false;
        let loopCount = 0;
        let index = currentIndex;

        while (loopCount < quizData.length) {
            index = (index + 1) % quizData.length; // ループさせる
            const item = quizData[index];
            const status = userProgress[item.id] || { mastered: false };
            
            if (!status.mastered) {
                currentIndex = index;
                found = true;
                break;
            }
            loopCount++;
        }

        if (found) {
            renderQuestion();
        } else {
            alert('すべての問題を「覚えた！」状態にしました！おめでとうございます！');
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    // 初期起動
    renderQuestion();
</script>
</body>
</html>
